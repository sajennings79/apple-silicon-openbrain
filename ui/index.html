<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenBrain</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b0d10;
        --panel: #14181d;
        --panel-2: #191e24;
        --border: #262c33;
        --text: #e6e9ef;
        --muted: #8a94a3;
        --accent: #7cc4ff;
        --accent-dim: #2a4a66;
        --tag: #1f2a36;
        --danger: #ff7a7a;
        --good: #7ce0a3;
        --warn: #e7c36b;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font: 14px/1.5 -apple-system, system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      header {
        padding: 14px 24px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 16px;
      }
      header h1 { margin: 0; font-size: 16px; font-weight: 600; white-space: nowrap; }
      nav { display: flex; gap: 4px; flex: 1; }
      nav a {
        color: var(--muted);
        text-decoration: none;
        font-size: 13px;
        padding: 6px 12px;
        border-radius: 6px;
      }
      nav a:hover { background: var(--panel-2); color: var(--text); }
      nav a.active { background: var(--accent-dim); color: var(--accent); font-weight: 600; }
      input[type="search"], .search-box {
        background: var(--bg);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 7px 12px;
        font: inherit;
      }
      header input[type="search"] { width: 280px; }
      .count { color: var(--muted); font-size: 12px; white-space: nowrap; }
      main {
        display: grid;
        grid-template-columns: 320px 1fr;
        gap: 20px;
        padding: 20px;
        max-width: 1500px;
        margin: 0 auto;
      }
      .wide { padding: 20px; max-width: 1100px; margin: 0 auto; }
      aside { display: flex; flex-direction: column; gap: 16px; }
      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 14px 16px;
      }
      .panel h2 {
        margin: 0 0 10px;
        font-size: 11px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.6px;
        font-weight: 600;
      }
      form { display: flex; flex-direction: column; gap: 8px; }
      label { font-size: 11px; color: var(--muted); }
      textarea, input, select {
        background: var(--bg);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 7px 10px;
        font: inherit;
        width: 100%;
      }
      textarea { resize: vertical; min-height: 90px; font-family: ui-monospace, monospace; }
      button {
        background: var(--accent);
        color: #00121f;
        border: 0;
        border-radius: 6px;
        padding: 8px 14px;
        font-weight: 600;
        cursor: pointer;
      }
      button.ghost {
        background: transparent;
        color: var(--muted);
        border: 1px solid var(--border);
      }
      button.ghost:hover { color: var(--text); border-color: var(--accent); }
      button.danger { background: var(--danger); color: #1a0000; }
      button.sm { padding: 4px 10px; font-size: 12px; }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      .status { font-size: 11px; color: var(--muted); min-height: 14px; }
      .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

      .stat-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 13px;
        cursor: pointer;
        border-radius: 4px;
        padding: 4px 6px;
        margin: 0 -6px;
      }
      .stat-row:hover { background: var(--panel-2); }
      .stat-row .key { color: var(--text); }
      .stat-row .count { color: var(--muted); font-variant-numeric: tabular-nums; }
      .stat-row.active { background: var(--accent-dim); }

      .bignum { font-size: 28px; font-weight: 600; line-height: 1; margin: 4px 0 2px; }

      .spark { display: flex; align-items: flex-end; gap: 2px; height: 36px; margin-top: 8px; }
      .spark .bar { flex: 1; background: var(--accent-dim); border-radius: 2px 2px 0 0; min-height: 2px; }
      .spark .bar:hover { background: var(--accent); }

      .tag-cloud { display: flex; flex-wrap: wrap; gap: 6px; }
      .tag {
        background: var(--tag);
        color: var(--accent);
        padding: 3px 10px;
        border-radius: 999px;
        font-size: 11px;
        cursor: pointer;
        border: 1px solid transparent;
        user-select: none;
      }
      .tag:hover { border-color: var(--accent); }
      .tag.active { background: var(--accent); color: #00121f; font-weight: 600; }
      .tag .n { opacity: 0.6; margin-left: 4px; font-size: 10px; }

      .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 14px; min-height: 24px; }
      .pill {
        background: var(--accent-dim);
        color: var(--accent);
        padding: 3px 10px;
        border-radius: 999px;
        font-size: 11px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .pill button { background: transparent; color: var(--accent); border: 0; padding: 0; cursor: pointer; font-size: 14px; line-height: 1; }

      .list { display: flex; flex-direction: column; gap: 12px; }
      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 14px 16px;
      }
      a.card { color: inherit; text-decoration: none; display: block; }
      .card.click { cursor: pointer; }
      .card.click:hover { border-color: var(--accent-dim); }
      .card.click:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
      .card .meta {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        font-size: 11px;
        color: var(--muted);
        margin-bottom: 8px;
        align-items: center;
      }
      .card .content {
        white-space: pre-wrap;
        word-break: break-word;
        font-family: ui-monospace, monospace;
        font-size: 13px;
        max-height: 260px;
        overflow: auto;
      }
      .card .summary { color: var(--muted); font-style: italic; margin-bottom: 8px; font-size: 13px; }
      .card .tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; align-items: center; }
      .badge { background: var(--tag); padding: 2px 8px; border-radius: 4px; font-size: 11px; }
      .badge.good { background: rgba(124, 224, 163, 0.16); color: var(--good); }
      .badge.warn { background: rgba(231, 195, 107, 0.16); color: var(--warn); }
      .badge.bad { background: rgba(255, 122, 122, 0.16); color: var(--danger); }
      .badge.sim { background: var(--accent-dim); color: var(--accent); font-variant-numeric: tabular-nums; }
      .badge.click { cursor: pointer; }
      .add-tag {
        background: transparent;
        border: 1px dashed var(--border);
        color: var(--muted);
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 11px;
        cursor: pointer;
      }
      .add-tag:hover { border-color: var(--accent); color: var(--accent); }
      .tag-input { background: var(--bg); border: 1px solid var(--accent); color: var(--text); border-radius: 999px; padding: 2px 10px; font-size: 11px; width: 120px; }
      .tag-remove { margin-left: 4px; opacity: 0; cursor: pointer; }
      .tag:hover .tag-remove { opacity: 0.7; }
      .tag-remove:hover { opacity: 1 !important; color: var(--danger); }

      .empty { color: var(--muted); text-align: center; padding: 40px 20px; font-style: italic; }
      .back { color: var(--muted); text-decoration: none; font-size: 13px; display: inline-block; margin-bottom: 14px; }
      .back:hover { color: var(--accent); }
      .view-title { font-size: 18px; font-weight: 600; margin: 0 0 16px; }
      .dl { display: grid; grid-template-columns: 140px 1fr; gap: 6px 14px; font-size: 13px; }
      .dl dt { color: var(--muted); }
      .dl dd { margin: 0; }
      .dup-pair { display: grid; grid-template-columns: 1fr auto 1fr; gap: 14px; align-items: stretch; }
      .dup-pair .content { max-height: 180px; }
      .dup-mid { display: flex; flex-direction: column; gap: 8px; align-items: center; justify-content: center; }
      .muted { color: var(--muted); }
      .section-h { font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; margin: 22px 0 10px; }
    </style>
  </head>
  <body>
    <header>
      <h1>🧠 OpenBrain</h1>
      <nav id="nav">
        <a href="#/" data-route="">Dashboard</a>
        <a href="#/search" data-route="search">Search</a>
        <a href="#/audit" data-route="audit">Audit</a>
        <a href="#/duplicates" data-route="duplicates">Duplicates</a>
        <a href="#/sources" data-route="sources">Sources</a>
        <a href="#/maintenance" data-route="maintenance">Maintenance</a>
      </nav>
      <span class="count" id="count"></span>
    </header>
    <div id="view"></div>

    <script>
      const state = {
        filters: { tag: null, type: null, source: null, q: null, sid: null },
        sidName: null, // display label for the sid (origin source) filter pill
        stats: null,
      };
      let dashTimer = null;

      const $ = (id) => document.getElementById(id);
      const fmt = (iso) => (iso ? new Date(iso).toLocaleString() : "");
      // Date-only strings (SQL DATE, e.g. perDay.day "2026-06-05") must be parsed
      // as a LOCAL date — new Date("YYYY-MM-DD") parses as UTC and drifts a day in
      // negative-offset timezones. Full timestamps keep going through new Date().
      const fmtDay = (iso) => {
        const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(String(iso ?? ""));
        const d = m ? new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3])) : new Date(iso);
        return d.toLocaleDateString(undefined, { month: "short", day: "numeric" });
      };
      const pct = (n) => `${(n * 100).toFixed(1)}%`;
      // Attributes that make a non-button [data-act] element keyboard-focusable.
      const ACT = 'role="button" tabindex="0"';

      function escape(s) {
        return String(s ?? "").replace(/[&<>"']/g, (c) => ({
          "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
        })[c]);
      }
      // Read an error message out of a failed Response without throwing.
      async function errMsg(res) {
        try { return (await res.json()).error || `HTTP ${res.status}`; }
        catch { return `HTTP ${res.status}`; }
      }

      // ---- Governance / trust-ladder badges (shared across views) ----
      function govBadges(m) {
        const out = [];
        const rs = m.reviewStatus;
        const ps = m.provenanceStatus;
        if (rs) {
          const cls = rs === "confirmed" ? "good" : rs === "rejected" ? "bad" : "warn";
          out.push(`<span class="badge ${cls}" title="review status">${escape(rs)}</span>`);
        }
        if (ps && ps !== rs) {
          const cls = ps === "user_confirmed" || ps === "imported" ? "good"
            : ps === "disputed" || ps === "superseded" ? "bad" : "warn";
          out.push(`<span class="badge ${cls}" title="provenance">${escape(ps)}</span>`);
        }
        if (m.createdBy) out.push(`<span class="badge" title="written by">by ${escape(m.createdBy)}</span>`);
        if (typeof m.qualityScore === "number")
          out.push(`<span class="badge ${m.qualityScore < 30 ? "bad" : m.qualityScore < 60 ? "warn" : "good"}" title="quality (derived from trust ladder)">q${m.qualityScore}</span>`);
        if (typeof m.importance === "number")
          out.push(`<span class="badge" title="importance (from confidence)">imp ${m.importance}</span>`);
        if (m.sensitivityTier) out.push(`<span class="badge bad" title="sensitivity tier (visibility)">${escape(m.sensitivityTier)}</span>`);
        return out.join(" ");
      }

      // =====================================================================
      // Event delegation
      // Dynamic, user-controlled values (tags, source, type) are carried in
      // data-* attributes and read via element.dataset — never interpolated
      // into inline JS handlers — so quotes in stored content can't break out
      // into executable script (stored-XSS safe).
      // =====================================================================
      function handleAct(t) {
        const d = t.dataset;
        switch (d.act) {
          case "filter": setFilter(d.key, d.val); break;
          case "clearfilter": clearFilter(d.key); break;
          case "removetag": removeTag(d.id, d.tag); break;
          case "addtag": openAddTag(d.id, t); break;
          case "detail-removetag": detailRemoveTag(d.id, d.tag); break;
          case "detail-addtag": openDetailAddTag(d.id, t); break;
          case "review": review(d.id, d.action); break;
          case "resolvedup": resolveDup(d.keep, d.supersede); break;
          case "src-new": editingSourceId = "new"; renderSourceList(); break;
          case "src-cancel": editingSourceId = null; renderSourceList(); break;
          case "src-edit": editingSourceId = d.id; renderSourceList(); break;
          case "src-toggle": srcToggle(d.id, d.enabled === "true"); break;
          case "src-sync": srcSync(d.id, t); break;
          case "src-del": srcDelete(d.id); break;
          case "src-pollall": srcPollAll(); break;
          case "src-memories":
            state.filters.sid = d.id;
            state.sidName = d.name;
            location.hash = "#/";
            break;
          case "mx-sweep": mxAction("sweep", "Sweep expired memories now?"); break;
          case "mx-purge": mxAction("purge", "Permanently purge soft-deleted memories older than 30 days? This cannot be undone."); break;
          case "mx-dedup": mxAction("resolve-exact-duplicates", "Resolve all exact-duplicate groups (keep newest/confirmed, supersede the rest)?"); break;
          case "mx-enrich": mxEnrich(true); break;
          case "mx-enrich-stop": mxEnrich(false); break;
          case "bulk-delete": bulkOp("delete"); break;
          case "bulk-tag": bulkOp("add-tag"); break;
          case "bulk-expiry": bulkOp("set-expiry"); break;
        }
      }
      document.addEventListener("click", (e) => {
        const act = e.target.closest("[data-act]");
        if (act) { e.preventDefault(); e.stopPropagation(); handleAct(act); return; }
        const nav = e.target.closest("[data-nav]");
        if (nav) location.hash = nav.dataset.nav;
      });
      // Keyboard activation for card "links" (role=link) and non-button [data-act]
      // controls (filters, tag chips, stat rows). Native <button> data-act elements
      // are skipped here — their Enter/Space already fires a click we delegate.
      document.addEventListener("keydown", (e) => {
        if (e.key !== "Enter" && e.key !== " ") return;
        const el = e.target;
        if (!el.matches) return;
        if (el.matches("[data-nav]")) { e.preventDefault(); location.hash = el.dataset.nav; return; }
        if (el.matches("[data-act]:not(button)")) { e.preventDefault(); handleAct(el); }
      });

      // =====================================================================
      // Router
      // =====================================================================
      function parseHash() {
        const h = location.hash.replace(/^#\/?/, "");
        const [name, param] = h.split("/");
        return { name: name || "", param: param || "" };
      }
      function setActiveNav(name) {
        for (const a of document.querySelectorAll("#nav a"))
          a.classList.toggle("active", a.dataset.route === name);
      }
      async function route() {
        const { name, param } = parseHash();
        setActiveNav(name);
        if (dashTimer) { clearInterval(dashTimer); dashTimer = null; }
        $("count").textContent = "";
        if (name === "") return renderDashboard();
        if (name === "memory") return renderDetail(param);
        if (name === "search") return renderSearch();
        if (name === "audit") return renderAudit();
        if (name === "duplicates") return renderDuplicates();
        if (name === "sources") return renderSources();
        if (name === "maintenance") return renderMaintenance();
        location.hash = "#/";
      }
      window.addEventListener("hashchange", route);

      // =====================================================================
      // Dashboard
      // =====================================================================
      function renderDashboard() {
        $("view").innerHTML = `
          <header style="border:0;padding:0 24px 0;max-width:1500px;margin:0 auto">
            <input type="search" id="search" placeholder="Filter content…" style="width:100%;max-width:480px;margin:8px 0" />
          </header>
          <main>
            <aside>
              <div class="panel">
                <h2>Total memories</h2>
                <div class="bignum" id="total">—</div>
                <div class="spark" id="spark"></div>
                <div class="status" style="margin-top:6px">last 30 days (by source date)</div>
              </div>
              <div class="panel">
                <h2>By month</h2>
                <div class="spark" id="month-spark" style="height:60px"></div>
                <div class="status" id="coverage" style="margin-top:6px"></div>
              </div>
              <div class="panel">
                <h2>New memory</h2>
                <form id="form">
                  <textarea name="content" required placeholder="What should I remember?"></textarea>
                  <select name="memoryType">
                    <option value="">type: (none)</option>
                    <option value="fact">fact</option>
                    <option value="decision">decision</option>
                    <option value="learning">learning</option>
                    <option value="conversation">conversation</option>
                  </select>
                  <input name="tags" placeholder="tags: project, idea" />
                  <button type="submit">Store</button>
                  <div class="status" id="status"></div>
                </form>
              </div>
              <div class="panel"><h2>By type</h2><div id="by-type"></div></div>
              <div class="panel"><h2>By source</h2><div id="by-source"></div></div>
              <div class="panel"><h2>Top tags</h2><div class="tag-cloud" id="top-tags"></div></div>
            </aside>
            <section>
              <div class="filter-bar" id="filter-bar"></div>
              <div class="list" id="list"></div>
            </section>
          </main>`;

        let searchTimer;
        $("search").value = state.filters.q || "";
        $("search").addEventListener("input", (e) => {
          clearTimeout(searchTimer);
          searchTimer = setTimeout(() => {
            state.filters.q = e.target.value.trim() || null;
            loadMemories();
            renderFilterBar();
          }, 200);
        });

        $("form").addEventListener("submit", async (e) => {
          e.preventDefault();
          const fd = new FormData(e.target);
          const tags = String(fd.get("tags") || "").split(",").map((t) => t.trim()).filter(Boolean);
          const body = {
            content: fd.get("content"),
            memoryType: fd.get("memoryType") || undefined,
            tags: tags.length ? tags : undefined,
          };
          $("status").textContent = "Storing…";
          const btn = e.target.querySelector("button[type=submit]");
          btn.disabled = true;
          try {
            const res = await fetch("/api/memories", {
              method: "POST",
              headers: { "content-type": "application/json" },
              body: JSON.stringify(body),
            });
            if (!res.ok) throw new Error(await errMsg(res));
            e.target.reset();
            $("status").textContent = "Stored.";
            await Promise.all([loadMemories(), loadStats()]);
          } catch (err) {
            $("status").textContent = `Error: ${err.message}`;
          } finally {
            btn.disabled = false;
            setTimeout(() => { const s = $("status"); if (s) s.textContent = ""; }, 3000);
          }
        });

        renderFilterBar();
        loadMemories();
        loadStats();
        dashTimer = setInterval(() => {
          if (parseHash().name !== "") return;
          loadMemories();
          loadStats();
        }, 20000);
      }

      function setFilter(key, value) {
        state.filters[key] = state.filters[key] === value ? null : value;
        loadMemories();
        renderFilterBar();
        renderStatsHighlights();
      }
      function clearFilter(key) {
        state.filters[key] = null;
        loadMemories();
        renderFilterBar();
        renderStatsHighlights();
      }

      function renderFilterBar() {
        const bar = $("filter-bar");
        if (!bar) return;
        const pills = [];
        for (const [k, v] of Object.entries(state.filters)) {
          if (!v) continue;
          const label = k === "sid" ? `feed: ${state.sidName || v.slice(0, 8)}` : `${k}: ${v}`;
          pills.push(`<span class="pill">${escape(label)} <button data-act="clearfilter" data-key="${escape(k)}">×</button></span>`);
        }
        // Bulk actions apply to EVERYTHING matching the active filters (not
        // just the rows shown) — only offered when at least one filter is set.
        const bulk = pills.length
          ? `<span style="flex:1"></span>
             <button class="sm ghost" data-act="bulk-tag">Tag all…</button>
             <button class="sm ghost" data-act="bulk-expiry">Set expiry on all…</button>
             <button class="sm danger" data-act="bulk-delete">Delete all…</button>`
          : "";
        bar.innerHTML = (pills.join("") || '<span style="color:var(--muted);font-size:11px">no filters</span>') + bulk;
      }

      async function loadMemories() {
        const list = $("list");
        if (!list) return;
        const params = new URLSearchParams();
        for (const [k, v] of Object.entries(state.filters)) if (v) params.set(k, v);
        params.set("limit", "100");
        try {
          const res = await fetch("/api/memories?" + params);
          if (!res.ok) throw new Error(await errMsg(res));
          const rows = await res.json();
          if ($("count")) $("count").textContent = `${rows.length} shown`;
          list.innerHTML = rows.length
            ? rows.map(renderCard).join("")
            : '<div class="empty">No memories match your filters.</div>';
        } catch (err) {
          list.innerHTML = `<div class="empty">Failed to load memories: ${escape(err.message)}</div>`;
        }
      }

      function renderCard(r) {
        const dateLabel = r.sourceDate
          ? `<span title="Original source date (imported ${escape(fmt(r.createdAt))})" style="color:var(--accent)">${escape(fmt(r.sourceDate))} ◆</span>`
          : `<span title="Import date">${escape(fmt(r.createdAt))}</span>`;
        const meta = [
          dateLabel,
          r.source ? `<span class="badge click" ${ACT} data-act="filter" data-key="source" data-val="${escape(r.source)}">${escape(r.source)}</span>` : "",
          r.memoryType ? `<span class="badge click" ${ACT} data-act="filter" data-key="type" data-val="${escape(r.memoryType)}">${escape(r.memoryType)}</span>` : "",
        ].filter(Boolean).join("");
        const tagChips = (r.tags || []).map((t) => `
          <span class="tag" ${ACT} data-act="filter" data-key="tag" data-val="${escape(t)}">
            ${escape(t)}<span class="tag-remove" ${ACT} data-act="removetag" data-id="${escape(r.id)}" data-tag="${escape(t)}" aria-label="remove tag ${escape(t)}">×</span>
          </span>`).join("");
        const summary = r.summary ? `<div class="summary">${escape(r.summary)}</div>` : "";
        return `
          <article class="card click" data-id="${escape(r.id)}" data-nav="#/memory/${escape(r.id)}" role="link" tabindex="0">
            <div class="meta">${meta}</div>
            ${summary}
            <div class="content">${escape(r.content)}</div>
            <div class="tags">
              ${tagChips}
              <button class="add-tag" data-act="addtag" data-id="${escape(r.id)}">+ tag</button>
            </div>
          </article>`;
      }

      function openAddTag(id, btn) {
        const input = document.createElement("input");
        input.className = "tag-input";
        input.placeholder = "new tag…";
        // Keep clicks inside the input from bubbling to the card's nav handler.
        input.addEventListener("click", (e) => e.stopPropagation());

          const val = input.value.trim();
          if (val) await addTag(id, val);

        input.addEventListener("keydown", (e) => {

          if (e.key === "Escape") loadMemories();
        });
        input.addEventListener("blur", commit);

      // Single PATCH path for tag add/remove — throws on a non-OK response so
      // callers surface the failure instead of silently reloading unchanged.
      async function patchTags(id, body) {

      async function addTag(id, tag) {

      // =====================================================================
      // Bulk operations on the active filters
      // =====================================================================
      async function bulkOp(action) {
        const filters = {};
        for (const [k, v] of Object.entries(state.filters)) if (v) filters[k] = v;
        if (!Object.keys(filters).length) return;

        let tag = null;
        let expiresInDays;
        if (action === "add-tag") {
          tag = prompt("Tag to add to ALL matching memories:");
          if (!tag || !tag.trim()) return;
          tag = tag.trim();
        }
        if (action === "set-expiry") {
          const raw = prompt("Expire ALL matching memories after how many days? (blank clears expiry)");
          if (raw === null) return;
          expiresInDays = raw.trim() === "" ? null : Number(raw);
          if (expiresInDays !== null && (!Number.isFinite(expiresInDays) || expiresInDays <= 0)) {
            flashStatus("status", "Invalid number of days.");
            return;
          }
        }

        try {
          const pres = await fetch("/api/memories/bulk-preview", {
            method: "POST", headers: { "content-type": "application/json" },
            body: JSON.stringify({ filters }),
          });
          if (!pres.ok) throw new Error(await errMsg(pres));
          const { count } = await pres.json();
          if (!count) { flashStatus("status", "No matching memories."); return; }

          const desc = Object.entries(filters)
            .map(([k, v]) => (k === "sid" ? `feed=${state.sidName || v.slice(0, 8)}` : `${k}=${v}`))
            .join(", ");
          const verb = action === "delete" ? "Delete"
            : action === "add-tag" ? `Add tag "${tag}" to`
            : expiresInDays === null ? "Clear expiry on" : `Expire in ${expiresInDays}d:`;
          if (!confirm(`${verb} ${count} memories matching [${desc}]?`)) return;

          const res = await fetch("/api/memories/bulk", {
            method: "POST", headers: { "content-type": "application/json" },
            body: JSON.stringify({ filters, action, tag, expiresInDays, expectedCount: count }),
          });
          if (res.status === 409) {
            flashStatus("status", "Results changed since preview — try again.");
            return;
          }
          if (!res.ok) throw new Error(await errMsg(res));
          const data = await res.json();
          flashStatus("status", `Bulk ${action}: ${data.affected} memories affected.`);
          await Promise.all([loadMemories(), loadStats()]);
        } catch (err) {
          flashStatus("status", `Bulk ${action} failed: ${err.message}`);
        }
      }

      async function loadStats() {
        if (!$("total")) return;
        try {
          const res = await fetch("/api/stats");
          if (!res.ok) throw new Error(await errMsg(res));
          state.stats = await res.json();
          renderStats();
        } catch {
          const t = $("total"); if (t) t.textContent = "—";
          const c = $("coverage"); if (c) c.textContent = "stats unavailable";
        }
      }
      function renderStats() {
        const s = state.stats;
        if (!s || !$("total")) return;
        $("total").textContent = s.total.toLocaleString();
        const days = [];
        const now = new Date();
        for (let i = 29; i >= 0; i--) {
          const d = new Date(now);
          d.setDate(d.getDate() - i);
          const key = d.toISOString().slice(0, 10);
          const r = s.perDay.find((x) => String(x.day).slice(0, 10) === key);
          days.push({ day: key, count: r ? r.count : 0 });
        }
        const max = Math.max(1, ...days.map((d) => d.count));
        $("spark").innerHTML = days.map((d) => `<div class="bar" title="${fmtDay(d.day)}: ${d.count}" style="height:${(d.count / max) * 100}%"></div>`).join("");
        const months = s.perMonth || [];
        const mmax = Math.max(1, ...months.map((m) => m.count));
        $("month-spark").innerHTML = months.map((m) => `<div class="bar" title="${m.month}: ${m.count}" style="height:${(m.count / mmax) * 100}%"></div>`).join("") || '<div class="status">no data</div>';
        const cov = s.coverage || { with_source_date: 0, total: s.total };
        const cpct = cov.total ? ((cov.with_source_date / cov.total) * 100).toFixed(0) : 0;
        $("coverage").textContent = `${cov.with_source_date}/${cov.total} have original source date (${cpct}%)`;
        renderStatsHighlights();
      }
      function statRow(kind, key, count) {
        const active = state.filters[kind] === key && key !== "(none)";
        const clickable = key !== "(none)";
        const attrs = clickable ? `${ACT} data-act="filter" data-key="${escape(kind)}" data-val="${escape(key)}"` : "";
        return `<div class="stat-row ${active ? "active" : ""}" ${attrs}>
          <span class="key">${escape(key)}</span><span class="count">${count}</span></div>`;
      }
      function tagCloudChip(tag, count) {
        return `<span class="tag ${state.filters.tag === tag ? "active" : ""}" ${ACT} data-act="filter" data-key="tag" data-val="${escape(tag)}">${escape(tag)}<span class="n">${count}</span></span>`;
      }
      function renderStatsHighlights() {
        if (!state.stats || !$("by-type")) return;
        $("by-type").innerHTML = state.stats.byType.map((r) => statRow("type", r.key, r.count)).join("") || '<div class="status">no data</div>';
        $("by-source").innerHTML = state.stats.bySource.map((r) => statRow("source", r.key, r.count)).join("") || '<div class="status">no data</div>';
        $("top-tags").innerHTML = state.stats.topTags.map((r) => tagCloudChip(r.tag, r.count)).join("") || '<div class="status">no tags yet</div>';
      }

      async function renderDuplicates() {

      async function loadDuplicates(threshold) {
        const body = $("dup-body");
        if (!body) return;
        try {
          const res = await fetch(`/api/duplicates?threshold=${threshold}`);
          if (!res.ok) throw new Error(await errMsg(res));
          const data = await res.json();
          const exact = (data.exact || []).map(renderDupGroup).join("");
          const near = (data.near || []).map(renderNearPair).join("");
          body.innerHTML = `
            <div class="section-h">Exact duplicates (shared content fingerprint)</div>
            ${exact || '<div class="muted">None.</div>'}
            <div class="section-h">Near duplicates (vector similarity ≥ ${escape(String(threshold))})</div>
            ${near || '<div class="muted">None above threshold.</div>'}`;

          body.innerHTML = `<div class="empty">Failed to load duplicates: ${escape(err.message)}</div>`;
        }

      function renderDupGroup(g) {
        // Keep the newest member; offer to supersede the older ones.
        const sorted = [...g.members].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
        const keep = sorted[0];
        return `
          <div class="panel" style="margin-bottom:12px">
            <div class="muted" style="margin-bottom:8px">${g.members.length} memories share content — keeping newest, supersede the rest:</div>
            ${sorted.map((mem, i) => `
              <div class="card" style="margin-bottom:8px;${i === 0 ? "border-color:var(--good)" : ""}">
                <div class="meta">
                  ${i === 0 ? '<span class="badge good">keep (newest)</span>' : ""}
                  <span>${escape(fmt(mem.createdAt))}</span>
                  ${mem.source ? `<span class="badge">${escape(mem.source)}</span>` : ""}
                  <a class="back" style="margin:0" href="#/memory/${escape(mem.id)}">open →</a>
                  ${i !== 0 ? `<button class="sm danger" data-act="resolvedup" data-keep="${escape(keep.id)}" data-supersede="${escape(mem.id)}">Supersede</button>` : ""}
                </div>
                <div class="content" style="max-height:120px">${escape(mem.content)}</div>
              </div>`).join("")}
          </div>`;
      }
      function renderNearPair(p) {
        return `
          <div class="panel dup-pair" style="margin-bottom:12px">
            <div>
              <div class="meta"><span>${escape(fmt(p.aCreatedAt))}</span><a class="back" style="margin:0" href="#/memory/${escape(p.aId)}">open →</a></div>
              <div class="content" style="max-height:160px">${escape(p.aContent)}</div>

              <button class="sm" data-act="resolvedup" data-keep="${escape(p.bId)}" data-supersede="${escape(p.aId)}">Keep ▶</button>
            </div>

              <div class="content" style="max-height:160px">${escape(p.bContent)}</div>
            </div>
          </div>`;
      }
      async function resolveDup(keepId, supersedeId) {
        if ($("dup-status")) $("dup-status").textContent = "Resolving…";
        try {
          const r = await fetch("/api/duplicates/resolve", {
            method: "POST", headers: { "content-type": "application/json" },
            body: JSON.stringify({ keepId, supersedeId }),
          });
          if (!r.ok) throw new Error(await errMsg(r));
          if ($("dup-status")) $("dup-status").textContent = "Resolved.";

      // =====================================================================
      // Sources (#/sources)
      // =====================================================================
      let sourcesCache = [];
      let editingSourceId = null; // null | uuid | "new"
      let lastSyncReport = null; // { id, text } survives the re-render after a sync

      const rel = (iso) => {
        if (!iso) return "never";
        const s = Math.round((Date.now() - new Date(iso)) / 1000);
        if (s < 60) return `${s}s ago`;
        if (s < 3600) return `${Math.round(s / 60)}m ago`;
        if (s < 86400) return `${Math.round(s / 3600)}h ago`;
        return `${Math.round(s / 86400)}d ago`;
      };
      const fmtInterval = (sec) => (sec < 3600 ? `${Math.round(sec / 60)}m` : `${Math.round(sec / 3600)}h`);

      // lastError outranks freshness: syncDueSources stamps lastSyncedAt as a
      // claim even when the sync then fails, so "recently synced" can be a lie.
      function sourceHealth(s) {
        if (s.lastError) return { cls: "bad", label: "error" };
        if (!s.enabled) return { cls: "warn", label: "off" };
        if (!s.lastSyncedAt || Date.now() - new Date(s.lastSyncedAt) > 2 * s.intervalSeconds * 1000)
          return { cls: "warn", label: "stale" };
        return { cls: "good", label: "ok" };
      }

      async function renderSources() {
        editingSourceId = null;
        $("view").innerHTML = `
          <div class="wide">
            <h2 class="view-title">Sources</h2>
            <div class="row" style="margin-bottom:14px">
              <button class="sm" data-act="src-new">+ Add source</button>
              <button class="sm ghost" data-act="src-pollall">Sync all due</button>
              <span class="status" id="src-status"></span>
            </div>
            <div id="src-form-slot"></div>
            <div class="list" id="src-list"><div class="empty">Loading…</div></div>
          </div>`;
        await loadSources();
      }

      async function loadSources() {
        try {
          const res = await fetch("/api/sources");
          if (!res.ok) throw new Error(await errMsg(res));
          sourcesCache = await res.json();
          if ($("count")) $("count").textContent = `${sourcesCache.length} sources`;
          renderSourceList();
        } catch (err) {
          const l = $("src-list");
          if (l) l.innerHTML = `<div class="empty">Failed to load sources: ${escape(err.message)}</div>`;
        }
      }

      function renderSourceList() {
        const list = $("src-list");
        if (!list) return;
        $("src-form-slot").innerHTML = editingSourceId === "new" ? sourceForm(null) : "";
        list.innerHTML = sourcesCache.length
          ? sourcesCache.map(renderSourceCard).join("")
          : '<div class="empty">No sources yet. Add an RSS feed, watched page, or mail account.</div>';
        bindSourceForm();
      }

      function renderSourceCard(s) {
        if (editingSourceId === s.id) return sourceForm(s);
        const h = sourceHealth(s);
        const cfg = s.config || {};
        const target = cfg.feedUrl || cfg.url || cfg.account || "";
        const report = lastSyncReport && lastSyncReport.id === s.id ? lastSyncReport.text : "";
        return `
          <article class="card">
            <div class="meta">
              <span class="badge ${h.cls}">${h.label}</span>
              <span class="badge">${escape(s.kind)}</span>
              <span>synced ${escape(rel(s.lastSyncedAt))}</span>
              <span>every ${escape(fmtInterval(s.intervalSeconds))}</span>
              ${cfg.retentionDays ? `<span class="badge warn" title="ingested memories expire after this many days">${escape(String(cfg.retentionDays))}d retention</span>` : ""}
              <span class="badge sim click" ${ACT} data-act="src-memories" data-id="${escape(s.id)}" data-name="${escape(s.name)}" title="show memories from this source">${s.memoryCount ?? 0} memories</span>
            </div>
            <div style="font-weight:600">${escape(s.name)}</div>
            <div class="muted" style="font-size:12px;word-break:break-all">${escape(target)}</div>
            ${s.lastError ? `<div style="color:var(--danger);font-size:12px;margin-top:6px;word-break:break-word">last error: ${escape(s.lastError)}</div>` : ""}
            <div class="row" style="margin-top:10px">
              <button class="sm" data-act="src-sync" data-id="${escape(s.id)}">Sync now</button>
              <button class="sm ghost" data-act="src-toggle" data-id="${escape(s.id)}" data-enabled="${s.enabled}">${s.enabled ? "Disable" : "Enable"}</button>
              <button class="sm ghost" data-act="src-edit" data-id="${escape(s.id)}">Edit</button>
              <button class="sm danger" data-act="src-del" data-id="${escape(s.id)}">Delete</button>
              <span class="status">${escape(report)}</span>
            </div>
          </article>`;
      }

      function sourceForm(s) {
        const cfg = (s && s.config) || {};
        const kind = s ? s.kind : "rss";
        const v = (x) => escape(x ?? "");
        return `
          <div class="panel" style="margin-bottom:12px">
            <h2>${s ? "Edit source" : "New source"}</h2>
            <form id="src-form" data-id="${s ? escape(s.id) : ""}">
              <div class="row">
                <select name="kind" id="src-kind" ${s ? "disabled" : ""} style="width:auto">
                  ${["rss", "webpage", "mail"].map((k) => `<option value="${k}" ${kind === k ? "selected" : ""}>${k}</option>`).join("")}
                </select>
                <input name="name" placeholder="name" required value="${s ? v(s.name) : ""}" style="flex:1" />
              </div>
              <div data-kind-field="rss">
                <label>feed URL</label>
                <input name="feedUrl" value="${v(cfg.feedUrl ?? cfg.url)}" placeholder="https://example.com/feed.xml" />
              </div>
              <div data-kind-field="webpage">
                <label>page URL (article links on it are ingested)</label>
                <input name="url" value="${v(cfg.url)}" placeholder="https://example.com/news" />
              </div>
              <div data-kind-field="mail">
                <label>account</label>
                <input name="account" value="${v(cfg.account)}" placeholder="you@gmail.com" />
                <label>gmail query</label>
                <input name="query" value="${v(cfg.query)}" placeholder="newer_than:1d -in:spam -in:trash" />
                <label>max messages per sync</label>
                <input name="maxMessages" type="number" min="1" value="${v(cfg.maxMessages)}" />
                <label style="display:flex;align-items:center;gap:6px"><input type="checkbox" name="followLinks" style="width:auto" ${cfg.followLinks ? "checked" : ""} /> follow links in bodies</label>
              </div>
              <div class="row">
                <div style="flex:1"><label>interval (seconds)</label><input name="intervalSeconds" type="number" min="60" max="86400" value="${s ? s.intervalSeconds : 3600}" /></div>
                <div style="flex:1"><label>retention (days, blank = keep forever)</label><input name="retentionDays" type="number" min="1" value="${v(cfg.retentionDays)}" /></div>
              </div>
              <div class="row">
                <button type="submit">${s ? "Save" : "Create"}</button>
                <button type="button" class="ghost" data-act="src-cancel">Cancel</button>
                <span class="status" id="src-form-status"></span>
              </div>
            </form>
          </div>`;
      }

      function bindSourceForm() {
        const form = $("src-form");
        if (!form) return;
        const kindSel = $("src-kind");
        const showKindFields = () => {
          for (const el of form.querySelectorAll("[data-kind-field]"))
            el.style.display = el.dataset.kindField === kindSel.value ? "" : "none";
        };
        kindSel.addEventListener("change", showKindFields);
        showKindFields();
        form.addEventListener("submit", async (e) => {
          e.preventDefault();
          const fd = new FormData(form);
          const kind = kindSel.value;
          const config = {};
          if (kind === "rss") config.feedUrl = String(fd.get("feedUrl") || "").trim();
          if (kind === "webpage") config.url = String(fd.get("url") || "").trim();
          if (kind === "mail") {
            config.account = String(fd.get("account") || "").trim();
            const q = String(fd.get("query") || "").trim();
            if (q) config.query = q;
            const mm = Number(fd.get("maxMessages"));
            if (mm > 0) config.maxMessages = mm;
            if (fd.get("followLinks")) config.followLinks = true;
          }
          const rd = Number(fd.get("retentionDays"));
          if (rd > 0) config.retentionDays = rd;
          const body = {
            name: String(fd.get("name") || "").trim(),
            intervalSeconds: Number(fd.get("intervalSeconds")) || 3600,
            config,
          };
          const id = form.dataset.id;
          if (!id) body.kind = kind;
          try {
            const res = await fetch(id ? `/api/sources/${id}` : "/api/sources", {
              method: id ? "PATCH" : "POST",
              headers: { "content-type": "application/json" },
              body: JSON.stringify(body),
            });
            if (!res.ok) throw new Error(await errMsg(res));
            editingSourceId = null;
            await loadSources();
          } catch (err) {
            const st = $("src-form-status");
            if (st) st.textContent = `Error: ${err.message}`;
          }
        });
      }

      async function srcToggle(id, enabled) {
        try {
          const res = await fetch(`/api/sources/${id}`, {
            method: "PATCH", headers: { "content-type": "application/json" },
            body: JSON.stringify({ enabled: !enabled }),
          });
          if (!res.ok) throw new Error(await errMsg(res));
          await loadSources();
        } catch (err) {
          flashStatus("src-status", `Toggle failed: ${err.message}`);
        }
      }

      async function srcSync(id, btn) {
        btn.disabled = true;
        lastSyncReport = { id, text: "syncing…" };
        renderSourceList();
        try {
          const res = await fetch(`/api/sources/${id}/sync`, { method: "POST" });
          const data = await res.json().catch(() => ({}));
          const r = data.report || {};
          lastSyncReport = {
            id,
            text: res.ok
              ? `${r.ingested ?? 0} ingested, ${r.duplicates ?? 0} duplicates, ${((r.elapsedMs ?? 0) / 1000).toFixed(1)}s`
              : `failed: ${data.error || r.error || `HTTP ${res.status}`}`,
          };
        } catch (err) {
          lastSyncReport = { id, text: `failed: ${err.message}` };
        }
        await loadSources();
      }

      async function srcPollAll() {
        flashStatus("src-status", "Triggering sync of all due sources…");
        try {
          const res = await fetch("/api/sources/poll-due", { method: "POST" });
          if (!res.ok) throw new Error(await errMsg(res));
          flashStatus("src-status", "Sync started in background.");
        } catch (err) {
          flashStatus("src-status", `Failed: ${err.message}`);
        }
      }

      async function srcDelete(id) {
        const s = sourcesCache.find((x) => x.id === id);
        if (!confirm(`Delete source "${s ? s.name : id}"? Its memories are kept.`)) return;
        try {
          const res = await fetch(`/api/sources/${id}`, { method: "DELETE" });
          if (!res.ok) throw new Error(await errMsg(res));
          await loadSources();
        } catch (err) {
          flashStatus("src-status", `Delete failed: ${err.message}`);
        }
      }

      // =====================================================================
      // Maintenance (#/maintenance)
      // =====================================================================
      let mxTimer = null;

      async function renderMaintenance() {
        $("view").innerHTML = `
          <div class="wide">
            <h2 class="view-title">Maintenance</h2>
            <p class="muted" style="margin-top:-8px">Data hygiene: retention sweep, purge, enrichment backlog, duplicate cleanup. Sweep + purge also run automatically once a day.</p>
            <div class="status" id="mx-status"></div>
            <div id="mx-panels"><div class="empty">Loading…</div></div>
          </div>`;
        await loadMaintenance();
      }

      async function loadMaintenance() {
        const panels = $("mx-panels");
        if (!panels) return;
        let s;
        try {
          const res = await fetch("/api/maintenance/stats");
          if (!res.ok) throw new Error(await errMsg(res));
          s = await res.json();
        } catch (err) {
          panels.innerHTML = `<div class="empty">Failed to load stats: ${escape(err.message)}</div>`;
          return;
        }
        const panel = (title, big, desc, actions) => `
          <div class="panel" style="margin-bottom:12px">
            <h2>${escape(title)}</h2>
            <div class="bignum">${escape(String(big))}</div>
            <div class="muted" style="font-size:12px;margin:4px 0 10px">${desc}</div>
            <div class="row">${actions}</div>
          </div>`;
        panels.innerHTML = `
          ${panel("Expired, pending sweep", s.expiredPending,
            "Live memories past their retention expiry (promoted/confirmed memories are exempt). Sweep soft-deletes them.",
            `<button class="sm" data-act="mx-sweep" ${s.expiredPending ? "" : "disabled"}>Sweep now</button>`)}
          ${panel("Purgeable soft-deletes", s.purgeable,
            "User-deleted memories older than 30 days. Purge removes them permanently (audit log is kept). Retention tombstones are shrunk, not removed.",
            `<button class="sm danger" data-act="mx-purge" ${s.purgeable || s.shrinkableTombstones ? "" : "disabled"}>Purge now</button>
             <span class="muted" style="font-size:12px">${escape(String(s.shrinkableTombstones))} tombstones to shrink</span>`)}
          ${panel("Unenriched memories", s.unenriched,
            "Memories without a summary. Enrichment runs the existing backlog script (sequential, GPU-safe) — it can take hours and is safe to stop and resume.",
            s.enrichRunning
              ? `<button class="sm danger" data-act="mx-enrich-stop">Stop</button><span class="badge warn">running…</span>`
              : `<button class="sm" data-act="mx-enrich" ${s.unenriched ? "" : "disabled"}>Enrich backlog</button>`)}
          ${panel("Exact-duplicate groups", s.dupGroups,
            "Groups of live memories sharing a content fingerprint. Resolve keeps the newest (or confirmed/user-written) member and supersedes the rest.",
            `<button class="sm" data-act="mx-dedup" ${s.dupGroups ? "" : "disabled"}>Resolve all</button>`)}
          ${panel("memories table size", s.tableSize,
            "Total on-disk size including indexes. After a large purge, run <code>VACUUM ANALYZE memories;</code> in psql to reclaim space.",
            "")}`;
        // Poll while the enrich script runs so the count ticks down live.
        if (mxTimer) { clearInterval(mxTimer); mxTimer = null; }
        if (s.enrichRunning) {
          mxTimer = setInterval(() => {
            if (parseHash().name !== "maintenance") { clearInterval(mxTimer); mxTimer = null; return; }
            loadMaintenance();
          }, 10000);
        }
      }

      async function mxAction(endpoint, confirmMsg) {
        if (confirmMsg && !confirm(confirmMsg)) return;
        flashStatus("mx-status", "Working…");
        try {
          const res = await fetch(`/api/maintenance/${endpoint}`, { method: "POST" });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
          const summary = Object.entries(data)
            .filter(([k, v]) => typeof v === "number" && k !== "elapsedMs")
            .map(([k, v]) => `${k}: ${v}`)
            .join(", ");
          flashStatus("mx-status", `Done — ${summary || "ok"}`);
          await loadMaintenance();
        } catch (err) {
          flashStatus("mx-status", `Error: ${err.message}`);
        }
      }

      async function mxEnrich(start) {
        try {
          const res = await fetch(`/api/maintenance/enrich-backlog${start ? "" : "/stop"}`, { method: "POST" });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
          flashStatus("mx-status", start ? "Enrichment started." : "Enrichment stopped.");
          await loadMaintenance();
        } catch (err) {
          flashStatus("mx-status", `Error: ${err.message}`);
        }
      }

      // ---- boot ----
      route();
    </script>
  </body>
</html>
